<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/3.60.0/phaser.min.js"></script>
    <style> 
        body { margin: 0; background: #222; overflow: hidden; touch-action: none; } 
    </style>
</head>
<body>
<script>
class MainScene extends Phaser.Scene {
    constructor() { super('MainScene'); }

    create() {
        // 1. World Setup
        this.matter.world.setBounds(0, 0, 2000, 2000);
        
        // 2. The Car
        this.car = this.add.rectangle(400, 300, 40, 20, 0xff4444);
        this.matter.add.gameObject(this.car);
        this.car.setFrictionAir(0.05);
        this.car.setMass(15);

        // 3. Simple Touch UI (The "Stick")
        this.joyBase = this.add.circle(0, 0, 50, 0xffffff, 0.2).setVisible(false).setScrollFactor(0);
        this.joyThumb = this.add.circle(0, 0, 25, 0xffffff, 0.5).setVisible(false).setScrollFactor(0);

        // 4. Camera
        this.cameras.main.startFollow(this.car, true, 0.1, 0.1);
        this.cameras.main.setZoom(1.5);

        // 5. Input Logic
        this.input.on('pointerdown', (pointer) => {
            this.joyBase.setPosition(pointer.x, pointer.y).setVisible(true);
            this.joyThumb.setPosition(pointer.x, pointer.y).setVisible(true);
        });

        this.input.on('pointermove', (pointer) => {
            if (pointer.isDown) {
                // Clamp thumb stick distance
                const angle = Phaser.Math.Angle.Between(this.joyBase.x, this.joyBase.y, pointer.x, pointer.y);
                const dist = Phaser.Math.Distance.Between(this.joyBase.x, this.joyBase.y, pointer.x, pointer.y);
                const maxDist = 50;
                
                const thumbDist = Math.min(dist, maxDist);
                this.joyThumb.x = this.joyBase.x + Math.cos(angle) * thumbDist;
                this.joyThumb.y = this.joyBase.y + Math.sin(angle) * thumbDist;

                // Store movement data
                this.moveAngle = angle;
                this.moveForce = thumbDist / maxDist;
            }
        });

        this.input.on('pointerup', () => {
            this.joyBase.setVisible(false);
            this.joyThumb.setVisible(false);
            this.moveForce = 0;
        });
    }

    update() {
        if (!this.car.body) return;
        const body = this.car.body;

        // --- 1. MOVEMENT ---
        if (this.moveForce > 0) {
            // Rotate car toward stick direction
            this.car.rotation = Phaser.Math.Angle.RotateTo(this.car.rotation, this.moveAngle, 0.1);
            
            // Apply thrust
            const power = 0.008 * this.moveForce;
            this.car.applyForce({
                x: Math.cos(this.car.rotation) * power,
                y: Math.sin(this.car.rotation) * power
            });
        }

        // --- 2. DRIFT LOGIC ---
        const sideVector = new Phaser.Math.Vector2(Math.cos(this.car.rotation + Math.PI/2), Math.sin(this.car.rotation + Math.PI/2));
        const lateralVel = sideVector.clone().multiply(new Phaser.Math.Vector2(body.velocity.x, body.velocity.y).dot(sideVector));
        this.car.setVelocity(body.velocity.x - lateralVel.x * 0.9, body.velocity.y - lateralVel.y * 0.9);

        // --- 3. CAMERA LEAD ---
        this.cameras.main.setFollowOffset(body.velocity.x * 10, body.velocity.y * 10);
    }
}

const config = {
    type: Phaser.AUTO,
    width: window.innerWidth,
    height: window.innerHeight,
    backgroundColor: '#222222',
    physics: { default: 'matter', matter: { gravity: { y: 0 } } },
    scene: MainScene,
    scale: { mode: Phaser.Scale.RESIZE, autoCenter: Phaser.Scale.CENTER_BOTH }
};

new Phaser.Game(config);
</script>
</body>
</html>
