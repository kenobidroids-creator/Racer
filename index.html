<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <script src="https://raw.githack.com/rexrainbow/phaser3-rex-notes/master/dist/rexvirtualjoystickplugin.min.js"></script>
    <style> body { margin: 0; background: #222; overflow: hidden; } </style>
</head>
<body>
<script>
class MainScene extends Phaser.Scene {
    constructor() { super('MainScene'); }

    create() {
        // 1. Setup World & Physics
        // We make the world larger than the screen to test the camera
        this.matter.world.setBounds(0, 0, 1600, 1200);
        
        // Add some "Scrap" walls to bounce off of
        this.matter.add.rectangle(400, 150, 200, 20, { isStatic: true });
        this.matter.add.rectangle(600, 400, 20, 300, { isStatic: true });

        // 2. The Car (Chassis)
        this.car = this.add.rectangle(400, 300, 40, 20, 0xff4444);
        this.matter.add.gameObject(this.car);
        this.car.setFrictionAir(0.05);
        this.car.setMass(15);
        this.car.body.restitution = 0.5; // Bounciness

        // 3. Tire Smoke Particles
        this.particles = this.add.particles(0, 0, 'smoke', {
            speed: { min: 10, max: 50 },
            scale: { start: 0.5, end: 0 },
            alpha: { start: 0.5, end: 0 },
            lifespan: 400,
            blendMode: 'SCREEN',
            emitting: false
        });
        // Create a simple white pixel for smoke since we have no assets
        const graphics = this.make.graphics({ x: 0, y: 0, add: false });
        graphics.fillStyle(0xcccccc, 1);
        graphics.fillRect(0, 0, 4, 4);
        graphics.generateTexture('smoke', 4, 4);

        // 4. Virtual Joysticks
        this.leftJoy = this.plugins.get('rexvirtualjoystickplugin').add(this, {
            x: 100, y: window.innerHeight - 100, radius: 50,
            base: this.add.circle(0, 0, 50, 0x888888, 0.5).setScrollFactor(0),
            thumb: this.add.circle(0, 0, 25, 0xcccccc, 0.8).setScrollFactor(0),
        });

        this.rightJoy = this.plugins.get('rexvirtualjoystickplugin').add(this, {
            x: window.innerWidth - 100, y: window.innerHeight - 100, radius: 50,
            base: this.add.circle(0, 0, 50, 0x888888, 0.5).setScrollFactor(0),
            thumb: this.add.circle(0, 0, 25, 0x4444ff, 0.8).setScrollFactor(0),
        });

        // 5. Camera Setup
        this.cameras.main.startFollow(this.car, true, 0.1, 0.1);
        this.cameras.main.setZoom(1.5);
        this.cameras.main.setBounds(0, 0, 1600, 1200);
    }

    update(time, delta) {
        if (!this.car.body) return;
        const body = this.car.body;

        // --- 1. MOVEMENT ---
        if (this.leftJoy.force > 0) {
            this.car.rotation = Phaser.Math.Angle.RotateTo(this.car.rotation, this.leftJoy.rotation, 0.1);
            const speed = 0.006 * this.leftJoy.force;
            this.car.applyForce({
                x: Math.cos(this.car.rotation) * speed,
                y: Math.sin(this.car.rotation) * speed
            });
        }

        // --- 2. DRIFT & SMOKE LOGIC ---
        const sideVector = new Phaser.Math.Vector2(Math.cos(this.car.rotation + Math.PI/2), Math.sin(this.car.rotation + Math.PI/2));
        const lateralVel = sideVector.clone().multiply(new Phaser.Math.Vector2(body.velocity.x, body.velocity.y).dot(sideVector));
        
        // Apply Grip (Kill lateral velocity)
        this.car.setVelocity(body.velocity.x - lateralVel.x * 0.9, body.velocity.y - lateralVel.y * 0.9);

        // Emit smoke if drifting hard
        if (lateralVel.length() > 1.5) {
            this.particles.emitParticleAt(this.car.x, this.car.y);
        }

        // --- 3. CAMERA LEAD ---
        // Look ahead based on velocity
        const lookAhead = 8; 
        this.cameras.main.setFollowOffset(body.velocity.x * lookAhead, body.velocity.y * lookAhead);
        
        // Basic "Crash" shake
        if (body.speed > 5 && this.matter.world.engine.pairs.list.length > 0) {
            this.cameras.main.shake(100, 0.005);
        }
    }
}

const config = {
    type: Phaser.AUTO,
    width: window.innerWidth, 
    height: window.innerHeight,
    pixelArt: true,
    physics: { default: 'matter', matter: { gravity: { y: 0 }, debug: false } },
    scene: MainScene,
    scale: { mode: Phaser.Scale.RESIZE, autoCenter: Phaser.Scale.CENTER_BOTH }
};

new Phaser.Game(config);
</script>
</body>
</html>
